services:
  app:
    build:
      context: .
      args:
        PYTHON_VERSION: "3.13"
        PROJECT_NAME: "tg_auth"
    image: tg-auth:local
    container_name: tg-auth
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      # Override DSN to write the SQLite file inside a named volume so it
      # survives `docker compose down` (use `down -v` to wipe).
      APP_DB_URL: "sqlite+aiosqlite:////data/tg_auth.db"
    volumes:
      - tg-auth-data:/data
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request,sys;sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health/ready').status==200 else 1)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  tg-auth-data:
